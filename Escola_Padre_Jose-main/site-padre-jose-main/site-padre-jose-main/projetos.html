<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Projetos - Escola Municipal Padre José</title>
    <link rel="shortcut icon" type="image/png" href="assets/favicon.png" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"

  <body>
    <header id="main-header"></header>

    <main>
      <section id="banner-projeto" class="banner-mini-contato container-fluid internal-banner">

          <div class="hero-conteudo col-lg-7 col-12">
            <span class="hero-badge">Ações que movimentam a escola</span>

            <p class="hero-text">Conheça iniciativas que ampliam o aprendizado e aproximam a escola da comunidade.</p>
          </div>
        </div>
      </section>

      <section id="projects-section" class="container">
        <div class="section-heading center">
          <span class="section-kicker">Projetos em destaque</span>
          <h2>Confira nossos projetos e descubra novas formas de participar da vida escolar.</h2>
        </div>
        <div id="cards-container" class="row d-flex justify-content-center"></div>
      </section>
    </main>

    <footer id="main-footer"></footer>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
